name: Relatório de Governança

on:
  workflow_dispatch:
  push:
    paths:
      - 'data/tasks.csv'
  schedule:
    - cron: "0 9 * * 1" # Toda segunda às 9h

jobs:
  build-report:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas matplotlib

      - name: Generate charts
        run: python scripts/generate_charts.py

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/dashboards/graficos/
          git diff --cached --quiet || git commit -m "chore: update governance charts [skip ci]"
          git push
