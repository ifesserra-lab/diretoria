name: Weekly Repository Catalog

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * 1" # Toda segunda às 09:00 BRT (12:00 UTC)

permissions:
  contents: write

jobs:
  sync-repositories:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate repository catalog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ORG: ifesserra-lab
        run: python scripts/sync_repositories.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/tools/README.md
          git diff --cached --quiet || git commit -m "chore(bot): atualiza catalogo de repositorios [skip ci]"
          git push
