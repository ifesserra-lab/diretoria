name: 🌙 Daily Site Update

on:
  schedule:
    - cron: '0 3 * * *' # Todo dia às 00:00 BRT (03:00 UTC)
  workflow_dispatch: # Permite execução manual

permissions:
  contents: write  # Para commit + push + gh-deploy
  issues: read     # Para ler issues no sync_activities

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Necessário para o gh-deploy ter acesso ao histórico completo

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 Instalar dependências
        run: pip install -r requirements-docs.txt

      - name: 🔄 Sincronizar atividades das issues do GitHub
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/sync_activities.py

      - name: 📊 Gerar gráficos do dashboard
        run: python scripts/generate_charts.py

      - name: 💾 Commit e push das alterações
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add \
            data/tasks.csv \
            docs/atividades/ \
            docs/dashboards/graficos/ \
            docs/index.md
          git diff --cached --quiet || git commit -m "chore(bot): atualização noturna de atividades e dashboards [skip ci]"
          git push

      - name: 🚀 Build e deploy do site (MkDocs → gh-pages)
        run: mkdocs gh-deploy --force --clean
