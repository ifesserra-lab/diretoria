site_name: "Diretoria - IFES Campus Serra"
site_description: "Portal de Governança, Atas e Decisões do DPPGE"
repo_url: "https://github.com/ifesserra-lab/diretoria"
edit_uri: "edit/master/docs/"

theme:
  name: material
  language: pt-BR
  custom_dir: overrides
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Trocar para modo escuro
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Trocar para modo claro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - Relatórios:
      - Visão geral: relatorios/index.md
      - Captação de Projetos (FAPES + FACTO): relatorios/captacao-projetos.html
      - ROI e Impacto da Pesquisa: relatorios/roi-impacto-pesquisa.html
      - Extensão — Campus Serra (SRC): relatorios/campus-serra.html
  - Equipe:
      - Equipe Gestora: equipe/index.md
  - Ferramentas:
      - Repositórios: tools/README.md
  - Comissões:
      - Resumo: comissao/README.md
      - Comissão de Energia: comissao/comissao-energia.md
      - Comissão de Eventos: comissao/comissao-eventos.md
      - Comissão de Gestão de Laboratórios: comissao/comissao-gestao-laboratorios.md
      - Comissão de Gestão de Projetos: comissao/comissao-gestao-projetos.md
      - Comissão de Impacto do Campus: comissao/comissao-impacto-campus.md
      - Comissão da Morpheus Jr.: comissao/comissao-morpheus.md
      - Comissão de Organização do SBF: comissao/comissao-sbf.md
      - Comissão da SNCT: comissao/comissao-snct.md
  - Processos:
      - Resumo: processo/README.md
      - Edital de Patrocínio de Empresas: processo/edital-patrocinio-empresas.md
      - Declaração de Ciência do NIT em Editais Fapes: processo/declaracao-ciencia-nit-editais-fapes.md
      - Acordo de PD&I com Aporte de Recurso: processo/acordo-pdi-com-aporte-recurso.md
      - Acordo de PD&I sem Aporte de Recurso: processo/acordo-pdi-sem-aporte-recurso.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  - mermaid2
