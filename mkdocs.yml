site_name: "Diretoria - IFES Campus Serra"
site_description: "Portal de Governança, Atas e Decisões do DPPGE"
repo_url: "https://github.com/ifesserra-lab/diretoria"
edit_uri: "edit/master/docs/"

theme:
  name: material
  language: pt-BR
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Trocar para modo escuro
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Trocar para modo claro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - Atas de Reunião:
      - Calendário 2026: pautas/calendario-reunioes-2026.md
      - '2026-02-27 - Planejamento': atas/2026-02-27-planejamento-dppge.md
  - Decisões Formais:
      - '001 - Diretrizes Planejamento': decisoes/001-diretrizes-planejamento-dppge.md
  - Relatórios de Atividades:
      - Modelo: atividades/modelo-atividades.md
      - 'Janeiro 2026': atividades/2026-01-atividades.md
      - 'Fevereiro 2026': atividades/2026-02-atividades.md
      - 'Março 2026': atividades/2026-03-atividades.md
  - Dashboards:
      - Visão Geral: dashboards/index.md
      - Indicadores: dashboards/indicadores.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  - mermaid2
