site_name: "Diretoria - IFES Campus Serra"
site_description: "Portal de Governança, Atas e Decisões do DPPGE"
repo_url: "https://github.com/ifesserra-lab/diretoria"
edit_uri: "edit/master/docs/"

theme:
  name: material
  language: pt-BR
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Trocar para modo escuro
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Trocar para modo claro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - Pautas: pautas/
  - Atas de Reunião: atas/
  - Decisões Formais: decisoes/
  - Relatórios de Atividades: atividades/
  - Dashboards:
      - Visão Geral: dashboards/index.md
      - Indicadores: dashboards/indicadores.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  - mermaid2
  - awesome-pages
